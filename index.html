<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Food, LLC</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <div class="navbar-brand">Food, LLC</div>

                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#mobileMenu">
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
            </div>

            <div id="mobileMenu" class="collapse navbar-collapse">
                <ul class="nav navbar-nav visible-xs text-center mobile-menu">
                    <li><a href="#chicken">Chicken</a></li>
                    <li><a href="#beef">Beef</a></li>
                    <li><a href="#sushi">Sushi</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-center" id="top">Our Menu</h1>

        <div class="row">
            <div id="chicken" class="col-md-4 col-sm-6 col-xs-12">
                <div class="menu-box">
                    <h3 class="text-center">Chicken</h3>
                    <p id="chickenText"></p>
                    <button class="btn btn-primary" onclick="changeContent('chicken')">More Info</button>
                    <br><br>
                    <a href="#top">Back to Top</a>
                </div>
            </div>

            <div id="beef" class="col-md-4 col-sm-6 col-xs-12">
                <div class="menu-box">
                    <h3 class="text-center">Beef</h3>
                    <p id="beefText"></p>
                    <button class="btn btn-primary" onclick="changeContent('beef')">More Info</button>
                    <br><br>
                    <a href="#top">Back to Top</a>
                </div>
            </div>

            <div id="sushi" class="col-md-4 col-sm-12 col-xs-12">
                <div class="menu-box">
                    <h3 class="text-center">Sushi</h3>
                    <p id="sushiText"></p>
                    <button class="btn btn-primary" onclick="changeContent('sushi')">More Info</button>
                    <br><br>
                    <a href="#top">Back to Top</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scroll to Top Button -->
    <button onclick="topFunction()" id="topBtn">Top</button>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <script>
        function changeContent(section) {
            if (section === 'chicken') {
                document.getElementById('chickenText').innerHTML =
                    "Chicken is rich in protein and widely used in many cuisines. It is healthy and tasty.";
            }
            if (section === 'beef') {
                document.getElementById('beefText').innerHTML =
                    "Beef is a good source of iron and protein. It is commonly used in burgers and steaks.";
            }
            if (section === 'sushi') {
                document.getElementById('sushiText').innerHTML =
                    "Sushi is a Japanese dish made with rice, seafood, and vegetables. It is very popular worldwide.";
            }
        }

        // Scroll to top button
        window.onscroll = function() {
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                document.getElementById("topBtn").style.display = "block";
            } else {
                document.getElementById("topBtn").style.display = "none";
            }
        };

        function topFunction() {
            document.body.scrollTop = 0;
            document.documentElement.scrollTop = 0;
        }
    </script>

</body>

</html>
